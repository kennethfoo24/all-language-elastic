# -----------------------------------------------------------------------------
# Golang — EDOT Go auto-instrumentation (eBPF based)
# -----------------------------------------------------------------------------
# NOTE: Go eBPF also needs the target binary path (OTEL_GO_AUTO_TARGET_EXE /
# the otel-go-auto-target-exe annotation, e.g. /app/hello-world) before traces
# appear. Omitted for now — add it here or in the elastic-instrumentation CR
# (spec.go.env) when Go tracing is required.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: all-language-golang
  name: all-language-golang
spec:
  replicas: 1
  selector:
    matchLabels:
      app: all-language-golang
  strategy: {}
  template:
    metadata:
      labels:
        app: all-language-golang
      annotations:
        instrumentation.opentelemetry.io/inject-go: "opentelemetry-operator-system/elastic-instrumentation"
    spec:
      containers:
      - image: kennethfoo49066/all-language-elastic-golang:latest
        name: all-language-golang
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DOTNET_SERVICE_URL
          value: "http://all-language-dotnet-lb:5555"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: all-language-golang
  name: all-language-golang-lb
spec:
  ports:
  - port: 8000
    protocol: TCP
    targetPort: 8000
  selector:
    app: all-language-golang
  type: ClusterIP
---
# -----------------------------------------------------------------------------
# Ruby — NOT supported by EDOT / OpenTelemetry Operator auto-instrumentation.
# -----------------------------------------------------------------------------
# There is no `inject-ruby` annotation. Instrument MANUALLY in the application:
#
#   1. Add gems to the Ruby service Gemfile:
#        gem "opentelemetry-sdk"
#        gem "opentelemetry-exporter-otlp"
#        gem "opentelemetry-instrumentation-all"
#   2. Initialize in app.rb (top of file, before the app boots):
#        require "opentelemetry/sdk"
#        require "opentelemetry/exporter/otlp"
#        require "opentelemetry/instrumentation/all"
#        OpenTelemetry::SDK.configure { |c| c.use_all }
#   3. The SDK reads the OTEL_* env vars below to find the collector and
#      name the service (no code-level endpoint config needed).
#
# OTLP traffic is sent to the EDOT Collector. Adjust the endpoint to match your
# install (here: a collector Service named `opentelemetry-collector` on 4318).
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: all-language-ruby
  name: all-language-ruby
spec:
  replicas: 1
  selector:
    matchLabels:
      app: all-language-ruby
  strategy: {}
  template:
    metadata:
      labels:
        app: all-language-ruby
    spec:
      containers:
      - image: kennethfoo49066/all-language-elastic-ruby:latest
        name: all-language-ruby
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4567
        env:
        - name: PHP_SERVICE_URL
          # Trailing slash is required: Apache 301-redirects /php -> /php/ and the
          # Ruby client does not follow it, so it would JSON-parse the redirect HTML.
          value: "http://all-language-php-lb:80/php/"
        # --- Manual OTel SDK configuration (consumed by the gems above) ---
        - name: OTEL_SERVICE_NAME
          value: "all-language-ruby"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://opentelemetry-collector.opentelemetry-operator-system:4318"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "http/protobuf"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=all-language-ruby,deployment.environment=demo"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: all-language-ruby
  name: all-language-ruby-lb
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 4567
  selector:
    app: all-language-ruby
  type: ClusterIP
status:
  loadBalancer: {}
---
