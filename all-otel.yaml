# =============================================================================
# all-otel.yaml
# -----------------------------------------------------------------------------
# Same topology as all.yaml, but each Deployment is annotated for Elastic
# Distribution of OpenTelemetry (EDOT) zero-code auto-instrumentation via the
# OpenTelemetry Operator.
#
# PREREQUISITES (cluster-wide, NOT created by this file):
#   1. OpenTelemetry Operator installed (ships with EDOT in the Elastic
#      "opentelemetry-kube-stack" Helm chart).
#   2. An Instrumentation CR named `elastic-instrumentation` in namespace
#      `opentelemetry-operator-system`. The annotations below reference it as
#      "opentelemetry-operator-system/elastic-instrumentation".
#   3. An EDOT Collector reachable at the OTLP endpoint used by the manually
#      instrumented services (Ruby / PHP) below.
#
# The operator mutates a Pod at admission time only when the inject annotation
# is present on the POD TEMPLATE (spec.template.metadata.annotations), which is
# where every annotation below lives.
#
# EDOT auto-instrumentation support per language:
#   nodejs  -> inject-nodejs   ✅ supported
#   python  -> inject-python   ✅ supported
#   java    -> inject-java     ✅ supported
#   dotnet  -> inject-dotnet   ✅ supported
#   golang  -> inject-go       ✅ supported (eBPF — needs elevated privileges)
#   ruby    -> ❌ NOT supported by EDOT/operator  -> manual OTel Ruby SDK
#   php     -> ❌ NOT supported by operator inject -> manual EDOT PHP SDK
# =============================================================================

# -----------------------------------------------------------------------------
# NodeJS — EDOT Node.js auto-instrumentation (public entry point)
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: all-language-nodejs
  name: all-language-nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: all-language-nodejs
  strategy: {}
  template:
    metadata:
      labels:
        app: all-language-nodejs
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry-operator-system/elastic-instrumentation"
    spec:
      containers:
      - image: kennethfoo49066/all-language-elastic-nodejs:latest
        name: all-language-nodejs
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PYTHON_SERVICE_URL
          value: "http://all-language-python-lb:5000/python"

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: all-language-nodejs
  name: all-language-nodejs-lb
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 3000
  selector:
    app: all-language-nodejs
  type: LoadBalancer
status:
  loadBalancer: {}
---
