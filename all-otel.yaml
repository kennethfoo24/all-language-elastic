# -----------------------------------------------------------------------------
# PHP — NOT supported by OpenTelemetry Operator auto-injection.
# -----------------------------------------------------------------------------
# There is no `inject-php` operator annotation. EDOT PHP exists as an SDK but
# must be added to the image / instrumented MANUALLY:
#
#   1. Install the OpenTelemetry PHP extension in the Dockerfile:
#        pecl install opentelemetry
#        docker-php-ext-enable opentelemetry
#   2. Add Composer packages (EDOT PHP distro):
#        composer require elastic/otel-php          # or open-telemetry/sdk
#        composer require open-telemetry/exporter-otlp
#   3. Enable auto-instrumentation via php.ini / env:
#        otel.enabled=1  (extension)  +  OTEL_PHP_AUTOLOAD_ENABLED=true
#   4. The SDK reads the OTEL_* env vars below to export to the collector.
#
# Endpoint points to the same EDOT Collector as the Ruby service above.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: all-language-php
  name: all-language-php
spec:
  replicas: 1
  selector:
    matchLabels:
      app: all-language-php
  template:
    metadata:
      labels:
        app: all-language-php
    spec:
      containers:
        - name: all-language-php
          image: kennethfoo49066/all-language-elastic-php:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            # --- Manual EDOT PHP SDK configuration ---
            - name: OTEL_PHP_AUTOLOAD_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: "all-language-php"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://opentelemetry-collector.opentelemetry-operator-system:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=all-language-php,deployment.environment=demo"
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: all-language-php
  name: all-language-php-lb
spec:
  type: ClusterIP
  selector:
    app: all-language-php
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
