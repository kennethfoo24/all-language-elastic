apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: all-language-nodejs
  name: all-language-nodejs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: all-language-nodejs
  strategy: {}
  template:
    metadata:
      labels:
        app: all-language-nodejs
    spec:
      containers:
      - image: kennethfoo49066/all-language-elastic-nodejs:latest
        name: all-language-nodejs
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PYTHON_SERVICE_URL
          value: "http://all-language-python-lb:5000/python"

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: all-language-nodejs
  name: all-language-nodejs-lb
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 3000
  selector:
    app: all-language-nodejs
  type: LoadBalancer
status:
  loadBalancer: {}
---
